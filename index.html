<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สำหรับบีม 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#ffd6e7,#ffc1d6);
margin:0;
padding:20px;
overflow:hidden;
}

.book{
background:white;
padding:25px;
border-radius:20px;
width:85%;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1,h2,h3,p{
margin:10px 0;
}

img{
width:200px;
border-radius:15px;
margin:15px;
cursor:pointer;
transition:0.3s;
}

img:hover{
transform:scale(1.08);
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d88;
color:white;
cursor:pointer;
margin:8px;
font-family:'Sarabun',sans-serif;
}

button:hover{
transform:scale(1.05);
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-family:'Sarabun',sans-serif;
}

.heart{
position:fixed;
font-size:24px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.fire{
position:fixed;
font-size:30px;
animation:boom 1.5s ease-out;
}

@keyframes boom{
0%{transform:scale(0);}
100%{transform:scale(1.6);opacity:0;}
}

@keyframes shake{
0%{transform:translate(-50%,-50%)}
25%{transform:translate(-48%,-50%)}
50%{transform:translate(-52%,-50%)}
75%{transform:translate(-48%,-50%)}
100%{transform:translate(-50%,-50%)}
}

</style>

</head>

<body>

<audio id="music" loop>
<source src="เพลงของบีม.mp3">
</audio>

<div class="book" id="page">

<h2>ใส่รหัสก่อนน้า ใบ้ให้ว่าเป็นวันเกิดอ้วน + วันเกิดเค้า 💌</h2>

<input type="password" id="pass" onkeypress="if(event.key==='Enter')check()">

<br><br>

<button onclick="check()">เข้าไปดู</button>

</div>

<script>

var page=document.getElementById("page");
var music=document.getElementById("music");

function check(){

var p=document.getElementById("pass").value;

if(p=="39"){

page.innerHTML=`

<h2>สมุดของเรา 📖</h2>

<p>บีมลองเปิดดูนะ</p>

<button onclick="start()">เปิดสมุด</button>

`;

}else{

showError();

}

}

function showError(){

let popup=document.createElement("div");

popup.innerHTML=`
<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
text-align:center;
z-index:999;
animation:shake 0.3s;
">

<h2>รหัสไม่ถูกนะ 😜</h2>
<p>ลองอีกครั้งนะ</p>

<button onclick="this.parentElement.parentElement.remove()">
โอเค
</button>

</div>
`;

document.body.appendChild(popup);

}

function start(){

music.volume=0.2;
music.play().catch(()=>{});

page1();

}

function page1(){

page.innerHTML=`

<h2>หน้าแรก</h2>

<p>ตั้งแต่ยุบได้รู้จักบีม ยุบมีความสุขมากๆเลยนะ</p>

<img src="https://i.ibb.co/Q7HWL880/photo1.jpg" onclick="page2()">

<p>กดรูปเพื่อเปิดหน้าถัดไป 💕</p>

`;

}

function page2(){

page.innerHTML=`

<h2>ยุบดีใจที่ได้เจอบีมจริงๆนะ</h2>

<img src="https://i.ibb.co/Q7HWL880/photo2.jpg" onclick="page3()">

`;

}

function page3(){

page.innerHTML=`

<h2>บางทีเราก็ทะเลาะกัน เข้าใจกันผิด</h2>
<p>แต่ยุบยังอยากมีบีมอยู่ในชีวิตนะ</p>

<img src="https://i.ibb.co/Q7HWL880/photo3.jpg" onclick="page4()">

`;

}

function page4(){

page.innerHTML=`

<h2>แล้วก็มีบางอย่างที่ยุบอยากจะบอก</h2>

<img src="https://i.ibb.co/Q7HWL880/photo4.jpg" onclick="ask()">

`;

}

function ask(){

page.innerHTML=`

<h1>บีมจะเป็นแฟนกับยุบไหม ❤️</h1>

<button onclick="yes()">ตกลง 💖</button>
<button id="noBtn" onmouseover="run()" onclick="run()">ไม่อะ 😜</button>

`;

}

function yes(){

page.innerHTML=`

<h1>เย้! ❤️</h1>
<h2>ยุบ & บีม</h2>
<h3>เป็นแฟนกันแล้วนะ</h3>

`;

setInterval(heart,300);
setInterval(firework,400);

}

function run(){

var btn=document.getElementById("noBtn");

btn.style.position="fixed";

var x=Math.random()*90;
var y=Math.random()*90;

btn.style.left=x+"vw";
btn.style.top=y+"vh";

}

function heart(){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},4000)

}

function firework(){

let f=document.createElement("div");
f.className="fire";
f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

setTimeout(()=>{
f.remove();
},1500)

}

</script>

</body>
</html>
